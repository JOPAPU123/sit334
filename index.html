<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>КОСЫЦЯ — ПИЗДЕЦ И ХАОС</title>
    <meta name="description" content="Улучшенная демонстрационная страница с анимацией и аватаром">
    <style>
        :root{
            --bg1:#050005;
            --bg2:#20000a;
            --accent:#ff2b2b;
            --muted:#ffffffcc;
            --glass: rgba(255,255,255,0.03);
            --max-width:1100px;
        }
        html,body{height:100%;}
        body {
            margin: 0;
            font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
            background: radial-gradient(1200px 600px at 10% 10%, rgba(255,0,0,0.06), transparent), linear-gradient(180deg,var(--bg1),var(--bg2));
            color: var(--muted);
            -webkit-font-smoothing:antialiased;
            -moz-osx-font-smoothing:grayscale;
            overflow: hidden;
        }
        .wrap{
            position:relative;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:40px 20px;
        }
        .card{
            width:100%;
            max-width:var(--max-width);
            background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.15));
            border-radius:16px;
            padding: clamp(18px, 3vw, 40px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6), 0 0 40px rgba(255,0,0,0.03) inset;
            backdrop-filter: blur(6px);
            position:relative;
            z-index:10;
            text-align:center;
        }
        header h1{
            margin:0;
            font-weight:800;
            color:var(--accent);
            font-family: 'Impact', sans-serif;
            font-size: clamp(2.2rem, 6vw, 6rem);
            letter-spacing:1px;
            text-shadow: 0 0 18px rgba(255,0,0,0.9), 0 2px 8px rgba(0,0,0,0.7);
        }
        .mat-text, .content-text{
            margin-top:12px;
            color:#fff;
            opacity:0.95;
            font-size: clamp(1rem, 2.2vw, 2rem);
            line-height:1.3;
        }
        .content{
            margin-top:18px;
            color:#fff;
            line-height:1.45;
            font-size: clamp(.9rem, 1.6vw, 1.3rem);
        }
        .avatar{
            margin-top:18px;
            display:inline-block;
            border-radius:12px;
            overflow:hidden;
            border:4px solid var(--accent);
            width: clamp(90px, 12vw, 180px);
            height: auto;
        }
        .btn{
            background:transparent;
            border:2px solid rgba(255,255,255,0.08);
            color:var(--muted);
            padding:8px 14px;
            border-radius:999px;
            cursor:pointer;
            transition:all .18s ease;
            font-weight:600;
            text-decoration:none;
            display:inline-flex;
            align-items:center;
            gap:8px;
        }
        .btn:hover{transform:translateY(-3px); box-shadow:0 8px 20px rgba(0,0,0,0.6)}
        .scene{ position:fixed; inset:0; pointer-events:none; z-index:1; }
        .troll-sprite{ position:absolute; width:100px; height:100px; will-change:transform; filter:drop-shadow(0 8px 20px rgba(0,0,0,0.7)); }
        @media (max-width:480px){
            .card{ padding:18px }
            .mat-text{ font-size:1rem }
        }
        footer{ position:fixed; left:12px; bottom:12px; color:#fff; opacity:0.5; font-size:.9rem; z-index:12 }
    </style>
</head>
<body>

    <div class="wrap">
        <main class="card" role="main" aria-labelledby="page-title">
            <header>
                <h1 id="page-title">Мега КОСЫЦЯ</h1>
            </header>

            <div class="mat-text">
                <p>ЭТО Пиздец срочно целуйте ей ноги бляяять</p>
                <p>кто будет плохо слизывать пыль с ее ботинок будет лизать подошву</p>
            </div>

            <img src="image_507512.png" class="avatar" alt="Аватар">
        </main>
    </div>

    <div class="scene" aria-hidden="true" id="scene"></div>
    <footer>Сделано лучше — готово к правкам и локализации</footer>

    <script>
        const scene = document.getElementById('scene');
        const TROLL_SRC = 'troll.png';
        const NUM = 4;
        const sprites = [];

        function randRange(min, max){ 
            let val = min + Math.random() * (max - min);
            return (val < 1 && val > -1) ? (val >= 0 ? 2 : -2) : val;
        }

        function createSprites(){
            scene.innerHTML = '';
            for(let i=0; i<NUM; i++){
                const img = document.createElement('img');
                img.src = TROLL_SRC;
                img.className = 'troll-sprite';
                img.alt = '';
                
                const w = 80 + Math.random() * 80;
                img.style.width = w + 'px';
                img.style.height = w + 'px';

                // Random spawn
                let x = Math.random() * (window.innerWidth - w);
                let y = Math.random() * (window.innerHeight - w);
                
                sprites.push({
                    el: img,
                    x: x,
                    y: y,
                    vx: randRange(-4, 4),
                    vy: randRange(-4, 4),
                    w: w
                });
                scene.appendChild(img);
            }
        }

        createSprites();

        function step(){
            for(const s of sprites){
                s.x += s.vx;
                s.y += s.vy;

                // Bounce borders
                if(s.x <= 0 || s.x + s.w >= window.innerWidth) s.vx *= -1;
                if(s.y <= 0 || s.y + s.w >= window.innerHeight) s.vy *= -1;

                // Clamp to ensure they don't get stuck
                if(s.x < 0) s.x = 0;
                if(s.x > window.innerWidth - s.w) s.x = window.innerWidth - s.w;
                if(s.y < 0) s.y = 0;
                if(s.y > window.innerHeight - s.w) s.y = window.innerHeight - s.w;

                s.el.style.transform = `translate(${s.x}px, ${s.y}px)`;
            }
            requestAnimationFrame(step);
        }
        
        requestAnimationFrame(step);

        window.addEventListener('resize', () => {
            // Reposition if resize makes them go out of bounds
            for(const s of sprites){
                if(s.x > window.innerWidth - s.w) s.x = window.innerWidth - s.w;
                if(s.y > window.innerHeight - s.w) s.y = window.innerHeight - s.w;
            }
        });
    </script>
</body>
</html>
