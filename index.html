<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>КОСЫЦЯ — ПИЗДЕЦ И ХАОС</title>
    <style>
        body {
            background: #000;
            margin: 0;
            overflow: hidden;
            color: #ff0000;
            font-family: 'Impact', sans-serif;
            text-align: center;
        }
        .main-content {
            padding-top: 50px;
            z-index: 100;
        }
        h1 { font-size: 6rem; text-shadow: 0 0 20px #f00; animation: flash 0.1s infinite; margin: 0; }
        .mat-text { font-size: 2rem; color: #fff; margin-top: 10px; }
        img.troll { position: absolute; width: 100px; z-index: 50; }
        @keyframes flash { 0% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="main-content">
        <h1>ЛЮТЕЙШАЯ ХУЙНЯ</h1>
        <div class="mat-text">
            <p>ЭТО ПИЗДЕЦ ОН СЛУШАЕТ БТС ДАЖЕ ЧИНГИСХАН ИХ НЕ СЛУШАЛ А ТУТ ТАКОЕ</p>
            <p>дана давай ты будешь слушать кальянный реп уже</p>
        </div>
    </div>

    <!-- Твой аватар под текстом -->
    <img src="image_507512.png" style="margin-top: 50px; width:150px; border: 5px solid red; z-index: 99; position: relative;">

    <script>
        const trolls = [];
        for (let i = 0; i < 4; i++) {
            let img = document.createElement('img');
            img.src = 'troll.png';
            img.className = 'troll';
            document.body.appendChild(img);
            trolls.push({
                el: img,
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                vx: (Math.random() - 0.5) * 20,
                vy: (Math.random() - 0.5) * 20
            });
        }

        function animate() {
            trolls.forEach(t => {
                t.x += t.vx; t.y += t.vy;
                if (t.x < 0 || t.x > window.innerWidth - 100) t.vx *= -1;
                if (t.y < 0 || t.y > window.innerHeight - 100) t.vy *= -1;
                t.el.style.left = t.x + 'px';
                t.el.style.top = t.y + 'px';
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
