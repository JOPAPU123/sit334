<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>КОСЫЦЯ — ПИЗДЕЦ И ХАОС</title>
    <meta name="description" content="Улучшенная демонстрационная страница с анимацией и аватаром">
    <style>
        :root{
            --bg1:#050005;
            --bg2:#20000a;
            --accent:#ff2b2b;
            --muted:#ffffffcc;
            --glass: rgba(255,255,255,0.03);
            --max-width:1100px;
        }
        html,body{height:100%;}
        body {
            margin: 0;
            font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
            background: radial-gradient(1200px 600px at 10% 10%, rgba(255,0,0,0.06), transparent), linear-gradient(180deg,var(--bg1),var(--bg2));
            color: var(--muted);
            -webkit-font-smoothing:antialiased;
            -moz-osx-font-smoothing:grayscale;
            overflow: hidden;
        }
        .wrap{
            position:relative;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:40px 20px;
        }
        .card{
            width:100%;
            max-width:var(--max-width);
            background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.15));
            border-radius:16px;
            padding: clamp(18px, 3vw, 40px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6), 0 0 40px rgba(255,0,0,0.03) inset;
            backdrop-filter: blur(6px);
            position:relative;
            z-index:10;
            text-align:center;
        }
        header h1{
            margin:0;
            font-weight:800;
            color:var(--accent);
            font-family: 'Impact', sans-serif;
            font-size: clamp(2.2rem, 6vw, 6rem);
            letter-spacing:1px;
            text-shadow: 0 0 18px rgba(255,0,0,0.9), 0 2px 8px rgba(0,0,0,0.7);
        }
        .mat-text, .content-text{
            margin-top:12px;
            color:#fff;
            opacity:0.95;
            font-size: clamp(1rem, 2.2vw, 2rem);
            line-height:1.3;
        }
        .content{
            margin-top:18px;
            color:#fff;
            line-height:1.45;
            font-size: clamp(.9rem, 1.6vw, 1.3rem);
        }
        .avatar{
            margin-top:18px;
            display:inline-block;
            border-radius:12px;
            overflow:hidden;
            border:4px solid var(--accent);
            width: clamp(90px, 12vw, 180px);
            height: auto;
        }
        .btn{
            background:transparent;
            border:2px solid rgba(255,255,255,0.08);
            color:var(--muted);
            padding:8px 14px;
            border-radius:999px;
            cursor:pointer;
            transition:all .18s ease;
            font-weight:600;
            text-decoration:none;
            display:inline-flex;
            align-items:center;
            gap:8px;
        }
        .btn:hover{transform:translateY(-3px); box-shadow:0 8px 20px rgba(0,0,0,0.6)}
        /* floating trolls container (uses absolute-positioned imgs) */
        .scene{ position:fixed; inset:0; pointer-events:none; z-index:1; }
        .troll-sprite{ position:absolute; width:100px; height:100px; transform:translate(-50%,-50%); will-change:transform; filter:drop-shadow(0 8px 20px rgba(0,0,0,0.7)); }
        /* small screens make layout cozy */
        @media (max-width:480px){
            .card{ padding:18px }
            .mat-text{ font-size:1rem }
        }
        footer{ position:fixed; left:12px; bottom:12px; color:#fff; opacity:0.5; font-size:.9rem; z-index:12 }
    </style>
</head>
<body>

    <div class="wrap">
        <main class="card" role="main" aria-labelledby="page-title">
            <header>
                <h1 id="page-title">ЛЮТЕЙШАЯ ХУЙНЯ</h1>
            </header>

            <div class="mat-text">
                <p>ЭТО ПИЗДЕЦ ОН СЛУШАЕТ БТС ДАЖЕ ЧИНГИСХАН ИХ НЕ СЛУШАЛ А ТУТ ТАКОЕ</p>
                <p>дана давай ты будешь слушать кальянный реп уже</p>
            </div>

            <!-- Твой аватар под текстом -->
            <img src="image_507512.png" class="avatar" alt="Аватар">
        </main>
    </div>

    <div class="scene" aria-hidden="true" id="scene"></div>
    <footer>Сделано лучше — готово к правкам и локализации</footer>

    <script>
        // Scene and sprites
        const scene = document.getElementById('scene');
        const TROLL_SRC = 'troll.png';
        const NUM = 4; // number of sprites (changed to 4)
        const sprites = [];

        function randRange(min, max){ return min + Math.random() * (max - min); }

        function createSprites(){
            scene.innerHTML = '';
            sprites.length = 0;
            for(let i=0;i<NUM;i++){
                const img = document.createElement('img');
                img.src = TROLL_SRC;
                img.className = 'troll-sprite';
                img.alt = '';
                // choose width and height (square sprites)
                const w = 80 + Math.random()*140;
                img.style.width = w + 'px';
                img.style.height = w + 'px';

                // start positions: keep inside viewport margins so they spawn visible
                const margin = 50;
                const x = margin + Math.random() * Math.max(0, innerWidth - margin*2);
                const y = margin + Math.random() * Math.max(0, innerHeight - margin*2);
                img.style.left = x + 'px';
                img.style.top = y + 'px';

                scene.appendChild(img);

                // random velocity, ensure not too small
                const vx = randRange(-4.5, 4.5);
                const vy = randRange(-4.5, 4.5);

                sprites.push({el:img,x,y,vx,vy,rot: randRange(0,360), rotV: randRange(-1.2,1.2), w});
            }
        }

        createSprites();

        let running = true; // always running

        function step(){
            if(running){
                for(const s of sprites){
                    s.x += s.vx; s.y += s.vy; s.rot += s.rotV;

                    // use actual size to compute bounce boundaries
                    const w = s.el.offsetWidth || s.w || 100;
                    const h = s.el.offsetHeight || w;
                    const halfW = w/2;
                    const halfH = h/2;

                    // left
                    if(s.x - halfW < 0){
                        s.x = halfW;
                        s.vx = Math.abs(s.vx) * 0.98; // bounce and damp slightly
                    }
                    // right
                    if(s.x + halfW > innerWidth){
                        s.x = innerWidth - halfW;
                        s.vx = -Math.abs(s.vx) * 0.98;
                    }
                    // top
                    if(s.y - halfH < 0){
                        s.y = halfH;
                        s.vy = Math.abs(s.vy) * 0.98;
                    }
                    // bottom
                    if(s.y + halfH > innerHeight){
                        s.y = innerHeight - halfH;
                        s.vy = -Math.abs(s.vy) * 0.98;
                    }

                    // apply transform (centered)
                    s.el.style.transform = `translate(${s.x}px, ${s.y}px) translate(-50%,-50%) rotate(${s.rot}deg)`;
                }
            }
            requestAnimationFrame(step);
        }
        requestAnimationFrame(step);

        // Resize handling
        window.addEventListener('resize', ()=>{
            // keep sprites inside
            for(const s of sprites){
                s.x = Math.min(Math.max(s.x, 0), innerWidth);
                s.y = Math.min(Math.max(s.y, 0), innerHeight);
            }
        });

    </script>
</body>
</html>
